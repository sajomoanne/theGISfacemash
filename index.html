<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facemash - Vote</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>who's hotter?</h1>
        </header>

        <div id="loading" class="loading">
            <p>Loading...</p>
        </div>

        <div id="voting-area" class="voting-area hidden">
            <div class="progress">
                <span id="round-counter">Round 1 of 20</span>
            </div>

            <div class="comparison">
                <div class="person-card" id="person-left" data-side="left">
                    <div class="story-segments" id="story-segments-left"></div>
                    <div class="photo-container">
                        <img id="photo-left" class="main-photo" src="" alt="Person">
                        <button class="carousel-btn carousel-prev" data-side="left" data-direction="prev">❮</button>
                        <button class="carousel-btn carousel-next" data-side="left" data-direction="next">❯</button>
                    </div>
                </div>

                <div class="person-card" id="person-right" data-side="right">
                    <div class="story-segments" id="story-segments-right"></div>
                    <div class="photo-container">
                        <img id="photo-right" class="main-photo" src="" alt="Person">
                        <button class="carousel-btn carousel-prev" data-side="right" data-direction="prev">❮</button>
                        <button class="carousel-btn carousel-next" data-side="right" data-direction="next">❯</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="completed" class="completed hidden">
            <h2>Thanks for voting!</h2>
            <p>You've completed all rounds.</p>
            <a href="results.html" class="btn">View Results</a>
        </div>

        <div id="error" class="error hidden">
            <p id="error-message">An error occurred</p>
        </div>
    </div>

    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
